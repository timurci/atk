# git-cliff configuration for Common Changelog (https://common-changelog.org/)
#
# Usage:
#   git cliff -o CHANGELOG.md          # full changelog
#   git cliff --unreleased -o CHANGELOG.md  # unreleased only (prepend to existing)
#   git cliff --config cliff.toml --bump    # auto-bump version + generate

[changelog]
# File header — written once, at the very top of CHANGELOG.md
header = """
# Changelog\n
"""

# Per-release body template (Tera / Jinja2 syntax)
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}\

### {{ group }}

{% for commit in commits %}\
- {% if commit.breaking %}**Breaking:** {% endif %}\
{{ commit.message | upper_first }} (`{{ commit.id | truncate(length=7, end="") }}`)
{% endfor %}\
{% endfor %}\n
"""

# Footer — no hyperlinks, just plain version anchors for local readability
footer = ""



# Remove trailing whitespace from each line in the output
trim = true

postprocessors = []

[git]
# Parse commits that follow Conventional Commits (https://www.conventionalcommits.org/)
# Common Changelog recommends writing commits in the imperative mood, which maps
# naturally to conventional commit subjects.
conventional_commits = true

# Drop commits that don't match any parser rule below (noise, CI commits, etc.)
filter_unconventional = true

# Strip the conventional-commit type/scope prefix so the changelog entry reads
# as plain imperative prose, e.g. "feat: add dark mode" → "Add dark mode"
split_commits = false

# Protect against injection of artificial commits
protect_breaking_commits = false

# Only keep commits that actually affect the distributed artefact
filter_commits = true

# Match annotated *and* lightweight tags; adjust if your project uses a prefix
tag_pattern = "v[0-9].*"

# Ignore pre-release tags by default (remove this line to include them)
skip_tags = "v?\\d+\\.\\d+\\.\\d+-(alpha|beta|rc)\\.\\d+"

# Never skip real releases
ignore_tags = ""

# Use topo-order so merge commits don't scramble history
topo_order = false

# Sort commits inside each group: latest first (matches Common Changelog guidance)
sort_commits = "newest"

# ── Commit parsers ────────────────────────────────────────────────────────────
# Rules are evaluated top-to-bottom; first match wins.
# `group`  → the ### heading in the changelog
# `skip`   → exclude from changelog entirely
# Breaking-change commits (footer "BREAKING CHANGE" or "!" suffix) are caught
# automatically by git-cliff and get `commit.breaking = true`, which the
# template renders as **Breaking:** regardless of their group.

commit_parsers = [
  # ── Changed ────────────────────────────────────────────────────────────────
  # API changes, refactors, dependency bumps, deprecations, performance work
  { message = "^feat!|^fix!|^refactor!", group = "Changed" },
  { message = "^refactor", group = "Changed" },
  { message = "^perf",     group = "Changed" },
  { message = "^change",   group = "Changed" },
  { message = "^deprecate",group = "Changed" },
  { message = "^bump",     group = "Changed" },

  # ── Added ──────────────────────────────────────────────────────────────────
  # New functionality (features, new supported environments, new docs)
  { message = "^feat",     group = "Added" },
  { message = "^add",      group = "Added" },

  # ── Removed ────────────────────────────────────────────────────────────────
  { message = "^remove|^drop|^delete", group = "Removed" },

  # ── Fixed ──────────────────────────────────────────────────────────────────
  { message = "^fix|^bug",  group = "Fixed" },
  { message = "^revert",    group = "Fixed" },

  # ── Noise — skip entirely ──────────────────────────────────────────────────
  # CI, tooling, dotfiles, test-only, code-style — not interesting to consumers
  { message = "^chore",                skip = true },
  { message = "^ci",                   skip = true },
  { message = "^test",                 skip = true },
  { message = "^style",                skip = true },
  { message = "^build",                skip = true },
  { message = "^docs?\\(changelog\\)", skip = true },
  # Merge commits
  { message = "^Merge (pull request|branch|remote)",  skip = true },
  # Release commits generated by tools (e.g. "chore(release): v1.2.3")
  { message = "^chore\\(release\\)",   skip = true },
]

# ── Bump ──────────────────────────────────────────────────────────────────────
# Controls automatic semver bumping when using `git cliff --bump`.
[bump]
# A `feat` commit always bumps the minor version (even on 0.x)
features_always_bump_minor = true
# A breaking change always bumps the major version (even 0.x → 1.0)
breaking_always_bump_major = true
# Keep custom pre-release metadata intact
custom_major_increment_regex = "major"
